# ============================================================
# 数莲 PaaS IM 系统 — Prometheus 配置
# ============================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'im-gateway-svc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['gateway-svc:8080']

  - job_name: 'im-auth-svc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['auth-svc:8080']

  - job_name: 'im-message-svc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['message-svc:8081']

  - job_name: 'im-bot-svc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['bot-svc:8082']

  - job_name: 'im-session-svc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['session-svc:8083']

  - job_name: 'im-contact-svc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['contact-svc:8084']

  - job_name: 'im-audit-svc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['audit-svc:8085']

  - job_name: 'im-group-svc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['group-svc:8086']

  - job_name: 'im-file-svc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['file-svc:8087']

  - job_name: 'im-rc-svc'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rc-svc:8088']

  - job_name: 'im-openim'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['openim:10002']

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql:9104']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']

  - job_name: 'mongo'
    static_configs:
      - targets: ['mongo:9216']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9308']

  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']
