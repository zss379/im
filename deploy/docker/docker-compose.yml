version: "3.8"

# ============================================================
# 数莲 PaaS IM 系统 — 开发环境 Docker Compose
# 使用: docker compose -f deploy/docker/docker-compose.yml up -d
# 停止: docker compose -f deploy/docker/docker-compose.yml down
# 重置全部数据: docker compose -f deploy/docker/docker-compose.yml down -v
# ============================================================

x-healthcheck: &healthcheck
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

services:
  # ============================================================
  # 基础设施
  # ============================================================

  mysql:
    image: mysql:8.0
    container_name: im-mysql
    restart: unless-stopped
    ports: ["${MYSQL_PORT:-3306}:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ../db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --slow_query_log=1
      --long_query_time=2
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      <<: *healthcheck

  redis:
    image: redis:7.0-alpine
    container_name: im-redis
    restart: unless-stopped
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redis123}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      <<: *healthcheck

  mongo:
    image: mongo:7.0
    container_name: im-mongo
    restart: unless-stopped
    ports: ["${MONGO_PORT:-27017}:27017"]
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo123}
      MONGO_INITDB_DATABASE: im_prod
    command: ["mongod", "--wiredTigerCacheSizeGB", "1"]
    healthcheck:
      test: echo "db.adminCommand('ping')" | mongosh --quiet -u ${MONGO_USER:-admin} -p ${MONGO_PASSWORD:-mongo123} --authenticationDatabase admin
      <<: *healthcheck

  kafka:
    image: bitnami/kafka:3.5
    container_name: im-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      <<: *healthcheck

  minio:
    image: minio/minio:latest
    container_name: im-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      <<: *healthcheck

  # ============================================================
  # 可观测性
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: im-prometheus
    restart: unless-stopped
    ports: ["${PROMETHEUS_PORT:-9090}:9090"]
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    container_name: im-grafana
    restart: unless-stopped
    ports: ["${GRAFANA_PORT:-3000}:3000"]
    depends_on:
      prometheus: { condition: service_started }
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning

  # ============================================================
  # 微服务 (内部通信，不暴露端口到宿主机)
  # ============================================================

  # ============================================================
  # API Gateway — 统一入口 (端口 8080)
  # ============================================================

  gateway-svc:
    build:
      context: ../../services/gateway-svc
    container_name: im-gateway
    restart: unless-stopped
    ports: ["${GATEWAY_PORT:-8080}:8080"]
    depends_on:
      auth-svc: { condition: service_started }
      message-svc: { condition: service_started }
      bot-svc: { condition: service_started }
      session-svc: { condition: service_started }
      contact-svc: { condition: service_started }
      audit-svc: { condition: service_started }
      group-svc: { condition: service_started }
      file-svc: { condition: service_started }
      rc-svc: { condition: service_started }
    volumes:
      - ../docker/config/gateway-svc.yaml:/app/config.yaml
    environment:
      TZ: Asia/Shanghai

  auth-svc:
    build:
      context: ../../services/auth-svc
    container_name: im-auth-svc
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../docker/config/auth-svc.yaml:/app/config.yaml
    environment:
      TZ: Asia/Shanghai

  message-svc:
    build:
      context: ../../services/message-svc
    container_name: im-message-svc
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
      kafka: { condition: service_healthy }
    volumes:
      - ../docker/config/message-svc.yaml:/app/config.yaml
    environment:
      TZ: Asia/Shanghai

  bot-svc:
    build:
      context: ../../services/bot-svc
    container_name: im-bot-svc
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    volumes:
      - ../docker/config/bot-svc.yaml:/app/config.yaml
    environment:
      TZ: Asia/Shanghai

  session-svc:
    build:
      context: ../../services/session-svc
    container_name: im-session-svc
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../docker/config/session-svc.yaml:/app/config.yaml
    environment:
      TZ: Asia/Shanghai

  contact-svc:
    build:
      context: ../../services/contact-svc
    container_name: im-contact-svc
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../docker/config/contact-svc.yaml:/app/config.yaml
    environment:
      TZ: Asia/Shanghai

  audit-svc:
    build:
      context: ../../services/audit-svc
    container_name: im-audit-svc
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../docker/config/audit-svc.yaml:/app/config.yaml
    environment:
      TZ: Asia/Shanghai

  group-svc:
    build:
      context: ../../services/group-svc
    container_name: im-group-svc
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../docker/config/group-svc.yaml:/app/config.yaml
    environment:
      TZ: Asia/Shanghai

  file-svc:
    build:
      context: ../../services/file-svc
    container_name: im-file-svc
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      minio: { condition: service_healthy }
    volumes:
      - ../docker/config/file-svc.yaml:/app/config.yaml
    environment:
      TZ: Asia/Shanghai

  rc-svc:
    build:
      context: ../../services/rc-svc
    container_name: im-rc-svc
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ../docker/config/rc-svc.yaml:/app/config.yaml
    environment:
      TZ: Asia/Shanghai

  # ============================================================
  # OpenIM Server (v3.8)
  # ============================================================

  openim:
    image: openim/server:v3.8
    container_name: im-openim
    restart: unless-stopped
    ports:
      - "10001:10001"
      - "10002:10002"
      - "10003:10003"
      - "10004:10004"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      mongo: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      OPENIM_API_PORT: "10002"
      OPENIM_WS_PORT: "10001"
      MSG_GATEWAY_PORT: "10004"

volumes:
  mysql_data:
  redis_data:
  mongo_data:
  kafka_data:
  minio_data:
  prometheus_data:
  grafana_data:
